server.port=${PORT:8080}

# Banco local por padr\u00e3o. Em nuvem, se DATABASE_URL estiver definida,
# ela passa a ter prioridade via DataSourceConfig.
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:expense_control}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:300903tmB#@}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.open-in-view=${SPRING_JPA_OPEN_IN_VIEW:false}

spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:4}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:1}
spring.datasource.hikari.idle-timeout=${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:120000}
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:600000}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.validation-timeout=${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:5000}
spring.datasource.hikari.keepalive-time=${SPRING_DATASOURCE_HIKARI_KEEPALIVE_TIME:0}

server.tomcat.threads.max=${SERVER_TOMCAT_THREADS_MAX:20}
server.tomcat.threads.min-spare=${SERVER_TOMCAT_THREADS_MIN_SPARE:2}
server.tomcat.max-connections=${SERVER_TOMCAT_MAX_CONNECTIONS:100}
server.tomcat.accept-count=${SERVER_TOMCAT_ACCEPT_COUNT:50}

logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:WARN}
logging.level.org.hibernate.orm.jdbc.bind=${HIBERNATE_BIND_LOG_LEVEL:WARN}

spring.security.debug=${SPRING_SECURITY_DEBUG:false}
logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL:WARN}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173,https://despesas-omega.up.railway.app,http://despesas-omega.up.railway.app,despesas-omega.up.railway.app}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.attachments.local-root=${ATTACHMENTS_LOCAL_ROOT:/solicitacoes}

GOOGLE_OAUTH_CLIENT_ID=
GOOGLE_OAUTH_CLIENT_SECRET=
GOOGLE_OAUTH_REFRESH_TOKEN=
GOOGLE_OAUTH_REDIRECT_URI=http://localhost:8080/oauth/google/callback


